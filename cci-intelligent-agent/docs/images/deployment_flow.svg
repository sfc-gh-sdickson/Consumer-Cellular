<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900">
  <defs>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="notebookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset in="blur" dx="2" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.2" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1000" height="900" fill="#F8FAFC"/>
  
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1E293B" text-anchor="middle">Deployment Workflow</text>
  
  <!-- Step 1 -->
  <circle cx="150" cy="100" r="30" fill="url(#stepGrad)"/>
  <text x="150" y="108" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <rect x="200" y="75" width="280" height="50" rx="8" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="95" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E293B" text-anchor="middle">Database and Schema Setup</text>
  <text x="340" y="112" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">01_database_and_schema.sql</text>
  
  <path d="M150 130 L150 160" stroke="#CBD5E1" stroke-width="3" fill="none"/>
  
  <!-- Step 2 -->
  <circle cx="150" cy="190" r="30" fill="url(#stepGrad)"/>
  <text x="150" y="198" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <rect x="200" y="165" width="280" height="50" rx="8" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E293B" text-anchor="middle">Create Tables</text>
  <text x="340" y="202" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">02_create_tables.sql (11 tables)</text>
  
  <path d="M150 220 L150 250" stroke="#CBD5E1" stroke-width="3" fill="none"/>
  
  <!-- Step 3 -->
  <circle cx="150" cy="280" r="30" fill="url(#stepGrad)"/>
  <text x="150" y="288" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <rect x="200" y="255" width="280" height="50" rx="8" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="275" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E293B" text-anchor="middle">Generate Synthetic Data</text>
  <text x="340" y="292" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">03_generate_synthetic_data.sql (100K+ rows)</text>
  
  <path d="M150 310 L150 340" stroke="#CBD5E1" stroke-width="3" fill="none"/>
  
  <!-- Step 4 -->
  <circle cx="150" cy="370" r="30" fill="url(#stepGrad)"/>
  <text x="150" y="378" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">4</text>
  <rect x="200" y="345" width="280" height="50" rx="8" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="365" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E293B" text-anchor="middle">Create Analytics Views</text>
  <text x="340" y="382" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">04_create_views.sql (7 views)</text>
  
  <path d="M150 400 L150 430" stroke="#CBD5E1" stroke-width="3" fill="none"/>
  
  <!-- Step 5 -->
  <circle cx="150" cy="460" r="30" fill="url(#stepGrad)"/>
  <text x="150" y="468" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">5</text>
  <rect x="200" y="435" width="280" height="50" rx="8" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="455" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E293B" text-anchor="middle">Create Semantic View</text>
  <text x="340" y="472" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">05_create_semantic_views.sql</text>
  
  <!-- Branch lines from Step 5 to parallel steps -->
  <path d="M150 490 L150 530" stroke="#CBD5E1" stroke-width="3" fill="none"/>
  <path d="M150 530 L150 560" stroke="#CBD5E1" stroke-width="3" fill="none"/>
  <path d="M150 530 L500 530 L500 560" stroke="#CBD5E1" stroke-width="3" fill="none"/>
  <path d="M150 530 L850 530 L850 560" stroke="#CBD5E1" stroke-width="3" fill="none"/>
  
  <!-- Step 6 - Cortex Search (left) - circle above box -->
  <circle cx="150" cy="590" r="30" fill="url(#stepGrad)"/>
  <text x="150" y="598" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">6</text>
  <rect x="50" y="630" width="200" height="50" rx="8" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="650" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1E293B" text-anchor="middle">Create Cortex Search</text>
  <text x="150" y="667" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">06_create_cortex_search.sql</text>
  
  <!-- Notebook Step (center) - circle above box -->
  <circle cx="500" cy="590" r="30" fill="url(#notebookGrad)"/>
  <text x="500" y="598" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">NB</text>
  <rect x="400" y="630" width="200" height="50" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="650" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#92400E" text-anchor="middle">Run ML Notebook (Optional)</text>
  <text x="500" y="667" font-family="Arial, sans-serif" font-size="8" fill="#B45309" text-anchor="middle">notebooks/ml_financial_models.ipynb</text>
  
  <!-- Step 7 - ML Functions (right) - circle above box -->
  <circle cx="850" cy="590" r="30" fill="url(#stepGrad)"/>
  <text x="850" y="598" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">7</text>
  <rect x="750" y="630" width="200" height="50" rx="8" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="850" y="650" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1E293B" text-anchor="middle">Deploy ML Functions</text>
  <text x="850" y="667" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">07_ml_model_functions.sql</text>
  
  <!-- Merge lines to Step 8 -->
  <path d="M150 680 L150 720 L500 720" stroke="#CBD5E1" stroke-width="3" fill="none"/>
  <path d="M500 680 L500 720" stroke="#CBD5E1" stroke-width="3" fill="none"/>
  <path d="M850 680 L850 720 L500 720" stroke="#CBD5E1" stroke-width="3" fill="none"/>
  <path d="M500 720 L500 760" stroke="#CBD5E1" stroke-width="3" fill="none"/>
  
  <!-- Step 8 - Final - circle above box -->
  <circle cx="500" cy="790" r="30" fill="#10B981"/>
  <text x="500" y="798" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">8</text>
  <rect x="400" y="830" width="200" height="50" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="850" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#065F46" text-anchor="middle">Create Cortex Agent</text>
  <text x="500" y="867" font-family="Arial, sans-serif" font-size="9" fill="#047857" text-anchor="middle">08_create_financial_agent.sql</text>
  
  <!-- Legend -->
  <rect x="560" y="80" width="180" height="160" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="650" y="105" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E293B" text-anchor="middle">Legend</text>
  <circle cx="585" cy="130" r="10" fill="url(#stepGrad)"/>
  <text x="660" y="135" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">SQL Script Step</text>
  <circle cx="585" cy="160" r="10" fill="url(#notebookGrad)"/>
  <text x="660" y="165" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Notebook Step</text>
  <circle cx="585" cy="190" r="10" fill="#10B981"/>
  <text x="660" y="195" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Final Deployment</text>
  <line x1="575" y1="218" x2="605" y2="218" stroke="#CBD5E1" stroke-width="3"/>
  <text x="660" y="223" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Dependency Flow</text>
</svg>
